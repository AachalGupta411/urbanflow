input {
  beats {
    port => 5044
  }
  tcp {
    port => 5000
    codec => json
  }
}

filter {
  if [message] {
    json {
      source => "message"
      skip_on_invalid_json => true
    }
  }
  mutate {
    add_field => { "platform" => "urbanflow" }
  }
}

output {
  elasticsearch {
    hosts => ["elasticsearch:9200"]
    index => "urbanflow-logs-%{+YYYY.MM.dd}"
  }
  stdout { codec => rubydebug }
}
