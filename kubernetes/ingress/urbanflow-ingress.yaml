apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: urbanflow-ingress
  namespace: urbanflow
  labels:
    app.kubernetes.io/part-of: urbanflow
    app.kubernetes.io/component: ingress
  annotations:
    kubernetes.io/ingress.class: nginx
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
    nginx.ingress.kubernetes.io/proxy-body-size: 10m
    nginx.ingress.kubernetes.io/proxy-connect-timeout: "30"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "60"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "60"
    nginx.ingress.kubernetes.io/limit-rps: "100"
    nginx.ingress.kubernetes.io/enable-cors: "true"
    nginx.ingress.kubernetes.io/cors-allow-origin: "https://urbanflow.example.com"
    nginx.ingress.kubernetes.io/cors-allow-methods: "GET, POST, PUT, DELETE, OPTIONS"
    nginx.ingress.kubernetes.io/cors-allow-headers: "Authorization, Content-Type"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - urbanflow.example.com
      secretName: urbanflow-tls
  rules:
    - host: urbanflow.example.com
      http:
        paths:
          - path: /api/tickets
            pathType: Prefix
            backend:
              service:
                name: ticketing-service
                port:
                  number: 3001
          - path: /api/passengers
            pathType: Prefix
            backend:
              service:
                name: passenger-service
                port:
                  number: 3002
          - path: /api/gps
            pathType: Prefix
            backend:
              service:
                name: gps-service
                port:
                  number: 3003
          - path: /api/notifications
            pathType: Prefix
            backend:
              service:
                name: notification-service
                port:
                  number: 3004
          - path: /api/analytics
            pathType: Prefix
            backend:
              service:
                name: analytics-service
                port:
                  number: 3005
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend
                port:
                  number: 80
