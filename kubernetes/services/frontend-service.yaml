apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: urbanflow
  labels:
    app.kubernetes.io/name: frontend
    app.kubernetes.io/part-of: urbanflow
    app.kubernetes.io/component: frontend
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: frontend
  ports:
    - name: http
      port: 80
      targetPort: http
      protocol: TCP
