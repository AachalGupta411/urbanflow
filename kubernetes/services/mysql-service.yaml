apiVersion: v1
kind: Service
metadata:
  name: mysql
  namespace: urbanflow
  labels:
    app.kubernetes.io/name: mysql
    app.kubernetes.io/part-of: urbanflow
    app.kubernetes.io/component: database
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: mysql
  ports:
    - name: mysql
      port: 3306
      targetPort: mysql
      protocol: TCP
