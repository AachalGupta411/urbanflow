apiVersion: v1
kind: Service
metadata:
  name: kafka
  namespace: urbanflow
  labels:
    app.kubernetes.io/name: kafka
    app.kubernetes.io/part-of: urbanflow
    app.kubernetes.io/component: messaging
spec:
  type: ClusterIP
  clusterIP: None
  publishNotReadyAddresses: true
  selector:
    app.kubernetes.io/name: kafka
  ports:
    - name: client
      port: 9092
      targetPort: client
      protocol: TCP
    - name: controller
      port: 9093
      targetPort: controller
      protocol: TCP
