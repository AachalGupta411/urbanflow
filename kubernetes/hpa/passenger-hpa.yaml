apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: passenger-service-hpa
  namespace: urbanflow
  labels:
    app.kubernetes.io/name: passenger-service
    app.kubernetes.io/part-of: urbanflow
    app.kubernetes.io/component: autoscaling
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: passenger-service
  minReplicas: 3
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
