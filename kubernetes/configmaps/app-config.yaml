apiVersion: v1
kind: ConfigMap
metadata:
  name: app-config
  namespace: urbanflow
  labels:
    app.kubernetes.io/part-of: urbanflow
    app.kubernetes.io/component: config
data:
  NODE_ENV: production
  LOG_LEVEL: info
  MYSQL_HOST: mysql
  MYSQL_PORT: "3306"
  MYSQL_POOL_SIZE: "10"
  REDIS_URL: redis://redis:6379
  KAFKA_BROKERS: kafka-0.kafka:9092,kafka-1.kafka:9092,kafka-2.kafka:9092
  KAFKA_CLIENT_ID: urbanflow-service
  KAFKA_GPS_TOPIC: gps-events
  KAFKA_TICKET_TOPIC: ticket-events
  KAFKA_PASSENGER_TOPIC: passenger-events
  KAFKA_SYSTEM_TOPIC: system-events
  KAFKA_CONSUMER_GROUP: notification-service-group
  KAFKA_ANALYTICS_GROUP: analytics-service-group
  JWT_EXPIRES_IN: 24h
  RATE_LIMIT_WINDOW_MS: "60000"
  RATE_LIMIT_MAX: "100"
  ANALYTICS_CACHE_TTL: "3600"
  NOTIFICATION_DEDUP_TTL: "300"
  GPS_CACHE_TTL: "30"
  GPS_TRACK_DEFAULT_LIMIT: "100"
  GPS_TRACK_MAX_LIMIT: "1000"
  PASSENGER_SERVICE_URL: http://passenger-service:3002
  AWS_REGION: us-east-1
  AWS_S3_BACKUP_BUCKET: urbanflow-mysql-backups
