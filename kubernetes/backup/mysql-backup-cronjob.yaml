apiVersion: batch/v1
kind: CronJob
metadata:
  name: mysql-backup
  namespace: urbanflow
  labels:
    app.kubernetes.io/name: mysql-backup
    app.kubernetes.io/part-of: urbanflow
    app.kubernetes.io/component: backup
spec:
  schedule: "0 2 * * *"
  timeZone: UTC
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  startingDeadlineSeconds: 600
  jobTemplate:
    metadata:
      labels:
        app.kubernetes.io/name: mysql-backup
        app.kubernetes.io/part-of: urbanflow
    spec:
      backoffLimit: 2
      activeDeadlineSeconds: 3600
      template:
        metadata:
          labels:
            app.kubernetes.io/name: mysql-backup
            app.kubernetes.io/part-of: urbanflow
            app.kubernetes.io/component: backup
        spec:
          serviceAccountName: mysql-backup
          restartPolicy: OnFailure
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            runAsGroup: 1000
            fsGroup: 1000
          initContainers:
            - name: mysqldump
              image: mysql:8.0.36
              imagePullPolicy: IfNotPresent
              command:
                - /bin/bash
                - -c
                - |
                  set -euo pipefail
                  TIMESTAMP=$(date -u +%Y%m%dT%H%M%SZ)
                  BACKUP_FILE="/backup/urbanflow-${TIMESTAMP}.sql.gz"
                  mysqldump \
                    -h mysql.urbanflow.svc.cluster.local \
                    -u "${MYSQL_USER}" \
                    -p"${MYSQL_PASSWORD}" \
                    --single-transaction \
                    --routines \
                    --triggers \
                    --databases passenger_db ticketing_db gps_db notification_db analytics_db \
                    | gzip > "${BACKUP_FILE}"
                  echo "${BACKUP_FILE}" > /backup/latest-backup-path.txt
                  ls -lh /backup/
              env:
                - name: MYSQL_USER
                  valueFrom:
                    secretKeyRef:
                      name: mysql-secrets
                      key: MYSQL_USER
                - name: MYSQL_PASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: mysql-secrets
                      key: MYSQL_PASSWORD
              volumeMounts:
                - name: backup
                  mountPath: /backup
              resources:
                requests:
                  memory: 256Mi
                  cpu: 100m
                limits:
                  memory: 512Mi
                  cpu: 500m
              securityContext:
                allowPrivilegeEscalation: false
                capabilities:
                  drop:
                    - ALL
          containers:
            - name: s3-upload
              image: amazon/aws-cli:2.15.30
              imagePullPolicy: IfNotPresent
              command:
                - /bin/bash
                - -c
                - |
                  set -euo pipefail
                  BACKUP_FILE=$(cat /backup/latest-backup-path.txt)
                  TIMESTAMP=$(basename "${BACKUP_FILE}" .sql.gz | sed 's/urbanflow-//')
                  aws s3 cp "${BACKUP_FILE}" \
                    "s3://${AWS_S3_BACKUP_BUCKET}/mysql/${TIMESTAMP}.sql.gz" \
                    --region "${AWS_REGION}"
                  echo "Backup uploaded to s3://${AWS_S3_BACKUP_BUCKET}/mysql/${TIMESTAMP}.sql.gz"
              envFrom:
                - configMapRef:
                    name: app-config
                - secretRef:
                    name: app-secrets
              volumeMounts:
                - name: backup
                  mountPath: /backup
                  readOnly: true
              resources:
                requests:
                  memory: 128Mi
                  cpu: 100m
                limits:
                  memory: 256Mi
                  cpu: 250m
              securityContext:
                allowPrivilegeEscalation: false
                capabilities:
                  drop:
                    - ALL
          volumes:
            - name: backup
              emptyDir: {}
