global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/alert-rules.yml

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ['localhost:9090']

  - job_name: ticketing-service
    metrics_path: /metrics
    static_configs:
      - targets: ['ticketing-service:3001']
        labels:
          service: ticketing-service

  - job_name: passenger-service
    metrics_path: /metrics
    static_configs:
      - targets: ['passenger-service:3002']
        labels:
          service: passenger-service

  - job_name: gps-service
    metrics_path: /metrics
    static_configs:
      - targets: ['gps-service:3003']
        labels:
          service: gps-service

  - job_name: notification-service
    metrics_path: /metrics
    static_configs:
      - targets: ['notification-service:3004']
        labels:
          service: notification-service

  - job_name: analytics-service
    metrics_path: /metrics
    static_configs:
      - targets: ['analytics-service:3005']
        labels:
          service: analytics-service

  - job_name: metrics-mock
    scrape_interval: 5s
    metrics_path: /metrics
    static_configs:
      - targets: ['metrics-mock:3010']
